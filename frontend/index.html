<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寻迹故宫 - 本地 MVP</title>
    <link rel="stylesheet" href="/assets/vendor/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Local Backend + Viewer MVP</p>
          <h1>寻迹故宫</h1>
          <p class="subtitle">MVP 收尾版：20 个 summer 场景题库，360 全景 + 宫图定位。</p>
        </div>
        <div class="hero-stats" id="hero-stats">
          <div class="stat-card">
            <span>场景</span>
            <strong id="scene-count">-</strong>
          </div>
          <div class="stat-card">
            <span>已缓存瓦片场景</span>
            <strong id="inventory-count">-</strong>
          </div>
          <div class="stat-card">
            <span>版本状态</span>
            <strong>MVP Ready</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel viewer-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">360 Viewer</p>
              <h2 id="scene-title">加载中</h2>
            </div>
            <div class="viewer-actions">
              <button id="random-btn" class="button button-primary" type="button">随机场景</button>
            </div>
          </div>

          <div class="viewer-frame" id="viewer-frame">
            <div class="viewer-placeholder">
              <p>正在初始化 360 viewer。</p>
              <p>如果瓦片能加载，这里会显示可拖拽的全景场景。</p>
            </div>
            <div id="pannellum-viewer" class="viewer-canvas"></div>
          </div>

          <div class="details-grid">
            <div class="detail-card">
              <span>场景名</span>
              <strong id="scene-name">-</strong>
            </div>
            <div class="detail-card">
              <span>建筑名</span>
              <strong id="panorama-name">-</strong>
            </div>
            <div class="detail-card">
              <span>组别</span>
              <strong id="scene-group">-</strong>
            </div>
            <div class="detail-card">
              <span>季节</span>
              <strong id="scene-seasons">-</strong>
            </div>
          </div>

        </section>

        <aside class="panel map-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">宫图定位</p>
              <h2>点击下点，估计位置</h2>
            </div>
            <div class="viewer-actions">
              <button id="map-recenter-btn" class="button" type="button">一键回中</button>
              <button id="submit-guess-btn" class="button button-primary" type="button">提交猜测</button>
            </div>
          </div>

          <div class="map-box">
            <div class="map-placeholder" id="map-placeholder">
              <p>宫图初始化中...</p>
              <p>若长时间空白，请刷新页面。</p>
            </div>
            <div id="mini-map" class="map-canvas"></div>
          </div>

          <div class="details-grid compact">
            <div class="detail-card">
              <span>X</span>
              <strong id="coord-x">-</strong>
            </div>
            <div class="detail-card">
              <span>Y</span>
              <strong id="coord-y">-</strong>
            </div>
            <div class="detail-card">
              <span>猜测 X</span>
              <strong id="guess-x">-</strong>
            </div>
            <div class="detail-card">
              <span>猜测 Y</span>
              <strong id="guess-y">-</strong>
            </div>
            <div class="detail-card">
              <span>误差距离</span>
              <strong id="guess-distance">-</strong>
            </div>
            <div class="detail-card">
              <span>本题得分</span>
              <strong id="guess-score">-</strong>
            </div>
          </div>

          <div class="scene-list-block">
            <div class="scene-list-head">
              <span>候选场景</span>
            </div>
            <div class="scene-list" id="scene-list"></div>
          </div>

        </aside>
      </main>
    </div>

    <script src="/assets/vendor/leaflet.js"></script>
    <script src="/assets/vendor/krpano.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
